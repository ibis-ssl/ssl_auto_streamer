<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オーバーレイ制御</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { overflow-y: auto; }
    .ctrl-panel {
      max-width: 500px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h2 {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--md-sys-color-on-surface);
      letter-spacing: 0;
    }
    .ctrl-section {
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--md-sys-shape-corner-large);
      padding: 0;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .ctrl-section h3 {
      font-size: 11px;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      padding: 10px 16px;
      background: var(--md-sys-color-surface-container-high);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctrl-section h3 .material-symbols-rounded {
      font-size: 16px;
    }
    .ctrl-section-body {
      padding: 12px 16px;
    }
    .ctrl-panel .toggle-row { font-size: 14px; }
    .ticker-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ticker-form input[type="text"] { width: 100%; }
    #ws-status-ctrl {
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #ws-dot-ctrl {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--md-sys-color-error);
    }
    #ws-dot-ctrl.ok { background: var(--md-ext-green); }
    .ctrl-panel .overlay-link {
      display: block;
      font-size: 13px;
      padding: 10px 0;
    }
  </style>
</head>
<body>
<div class="ctrl-panel">
  <h2>オーバーレイ制御</h2>

  <div id="ws-status-ctrl">
    <div id="ws-dot-ctrl"></div>
    <span id="ws-label-ctrl">接続中...</span>
  </div>

  <div class="ctrl-section">
    <h3><span class="material-symbols-rounded">link</span>リンク</h3>
    <div class="ctrl-section-body">
      <a class="overlay-link" id="overlay-link" href="/overlay" target="_blank">/overlay — OBSブラウザソース用</a>
      <p style="font-size:12px;color:var(--md-sys-color-on-surface-variant);margin-top:4px;">
        OBS → ブラウザソース → URL に上記アドレスを設定
      </p>
    </div>
  </div>

  <div class="ctrl-section">
    <h3><span class="material-symbols-rounded">tv</span>HUD 表示制御</h3>
    <div class="ctrl-section-body">
      <div class="toggle-row">
        <span>スコアバー表示</span>
        <label class="switch">
          <input type="checkbox" id="toggle-hud" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>効果音 (オーバーレイ側)</span>
        <label class="switch">
          <input type="checkbox" id="toggle-sound" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="ctrl-section">
    <h3><span class="material-symbols-rounded">subtitles</span>手動テロップ</h3>
    <div class="ctrl-section-body">
      <div class="ticker-form">
        <input type="text" id="ticker-text" placeholder="テキストを入力してオーバーレイに表示">
        <button class="btn btn-primary" id="send-ticker-btn">送信 (5秒)</button>
      </div>
    </div>
  </div>

  <div class="ctrl-section">
    <h3><span class="material-symbols-rounded">layers</span>表示要素</h3>
    <div class="ctrl-section-body">
      <div class="toggle-row">
        <span>スタッツパネル</span>
        <label class="switch">
          <input type="checkbox" id="toggle-stats">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>AI実況字幕</span>
        <label class="switch">
          <input type="checkbox" id="toggle-subtitles" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>ポゼッションバー</span>
        <label class="switch">
          <input type="checkbox" id="toggle-possession" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>ゴール演出エフェクト</span>
        <label class="switch">
          <input type="checkbox" id="toggle-celebration" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/ws-utils.js"></script>
<script src="/static/js/overlay-control.js"></script>
</body>
</html>
